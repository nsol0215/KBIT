<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      const numbers = [10, 20, 30, 40, 50];
      let sum = 0;
      for (let index = 0; index < numbers.length; index++) {
        sum += numbers[index];
      }
      alert('배열의 총합은 ' + sum + '입니다.');
    </script>
  </head>
  <body></body>
</html>
