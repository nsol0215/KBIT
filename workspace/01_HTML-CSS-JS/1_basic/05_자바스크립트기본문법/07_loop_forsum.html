<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      // let sum은 for 밖에서 반복문이라는 기계가 일을 하는 동안,
      // 그 결과를 차곡차곡 쌓아서 마지막에 보여주기 위해 우리가 만든 '저장소'

      // 합계 저장용 변수(변수 이름은 중요하지 않음)
      let sum = 0; // 전역 변수
      // 0부터 100까지 반복하는 반복문
      for (let i = 0; i <= 100; i++) {
        // 누적
        // sum = sum + i;
        sum += i; //sum에 누적해야 숫자가 증감할 수 있음
      }
      // alert(i);
      // ReferenceError : i is not defined
      //-> i는 for문 안에서만 사용 가능하다.
      alert(sum);
    </script>
  </head>
  <body></body>
</html>
<!-- 전역 변수: 어디서든 수정하고 가져다 쓸 수 있음. (편하지만, 너무 많으면 코드가 꼬임)
지역 변수: 특정 중괄호 { } 안에서만 살다가 사라짐. (안전하지만, 밖에서 못 씀) -->
