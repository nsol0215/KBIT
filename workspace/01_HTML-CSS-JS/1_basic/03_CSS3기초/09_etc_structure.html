<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    ul {
      overflow: hidden;
    }
    li {
      /* 앞에 붙는 까만 점들 없앨게 */
      list-style: none;
      float: left;
      padding: 15px;
    }
    li:first-child {
      /* 왼쪽 모서리 둥글게 */
      border-radius: 10px 0 0 10px;
    }
    li:last-child {
      /* 오른쪽 모서리 둥글게 */
      border-radius: 0 10px 10px 0;
    }
    li:nth-child(2n) {
      /* 짝수 */
      background-color: #ff0003;
    }
    li:nth-child(2n + 1) {
      /* 홀수 */
      background-color: #800000;
    }
  </style>
  <body>
    <ul>
      <li>첫번째</li>
      <li>두번째</li>
      <li>세번째</li>
      <li>네번째</li>
      <li>다섯번째</li>
      <li>여섯번째</li>
      <li>일곱번째</li>
    </ul>
  </body>
</html>
