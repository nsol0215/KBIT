<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: red;
      }
      #container {
        width: 500px;
        height: 250px;
        background-color: orange;
        position: absolute;
        left: 50%;
        top: 50%;
        margin-left: -250px;
        margin-top: -125px;
        /* 50% 이동하고, 내 너비 절반만큼 뒤로 빼면 정중앙에 위치 */
      }
    </style>
  </head>
  <body>
    <div id="container"><h1>요소의 중앙 배치</h1></div>
  </body>
</html>
