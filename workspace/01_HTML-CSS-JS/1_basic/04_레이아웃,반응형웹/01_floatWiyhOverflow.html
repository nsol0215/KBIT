<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div.container {
        overflow: hidden;
      }
      div.item {
        float: left;
        margin: 0px 3px;
        padding: 10px;
        border: 1px solid black;
      }
      div.clear {
        clear: both;
      }
    </style>
  </head>
  <body>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. ....</p>
    <div class="container">
      <div class="item">메뉴-1</div>
      <div class="item">메뉴-2</div>
      <div class="item">메뉴-3</div>
      <div class="item">메뉴-4</div>
    </div>
    <div class="clear"></div>
    <!-- 밑에 있는 p까지 float 될 정도로 힘이 강해서 clear로 여기까지 라는 걸 알려줘야 함 -->
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. ...</p>
  </body>
</html>
